services:
  - type: web
    name: reports-bdl
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: DB_POOL_MAX_SIZE
        value: "3"
      - key: DB_POOL_MIN_IDLE
        value: "1"

# Configuración del servidor
server.port=${PORT:8080}
server.servlet.context-path=/

# Cargar variables desde archivo .env (formato KEY=VALUE)
spring.config.import=optional:file:.env[.properties]

# Nombre de la aplicación
spring.application.name=report

# Configuración PostgreSQL / Supabase (prioriza .env)
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/reportdb}
spring.datasource.username=${SUPABASE_DB_USER:report_user}
spring.datasource.password=${SUPABASE_DB_PASSWORD:report_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (importante para Supabase pooler)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de logs
logging.level.com.example.report=DEBUG
logging.level.org.springframework=INFO

# Actuator - exponer endpoints de salud
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Información de la aplicación
info.app.name=Report API
info.app.version=0.0.1-SNAPSHOT
info.app.java=Java 8

# Configuración del servidor
server.port=8080
server.servlet.context-path=/

# Nombre de la aplicación
spring.application.name=report

# Configuración PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/reportdb
spring.datasource.username=report_user
spring.datasource.password=report_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de logs
logging.level.com.example.report=DEBUG
logging.level.org.springframework=INFO

# Actuator - exponer endpoints de salud
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Información de la aplicación
info.app.name=Report API
info.app.version=0.0.1-SNAPSHOT
info.app.java=Java 8
